<!DOCTYPE html>
<html>
    <head>
        <!--TAB INIT AND METAS-->
        <title>John Website</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--CSS STYLING-->
        <style>
            body {
                font-family: monospace;
                background-color: #3d3d5c;
                color: #e0e0e0;
            }
            button {
                background-color: rgb(30, 60, 70);
                border-radius: 2px;
                cursor: pointer;
            }
            .center {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .center img {
                width: 32vw;
            }
            .footer {
                position: fixed;
                left: 0;
                bottom: 0;
                width: 100%;
            }
        </style>
    </head>

    <body>
        <!--HEADERS-->
        <h1>John Website</h1>
        <h2>Yes it is him, John Website</h2>

        <!--MAIN CONTENT-->
        <div class="center">
            <img src="images/maxwell.gif" alt="Maxwell">
        </div>

        <!--AUDIO INIT AND CONTROLS-->
        <audio autoplay loop id="music">
            <source id="audio" src="" type="audio/mpeg">
        </audio>

        <div class="footer">
            <text>Volume: </text>
            <button onclick="volumeUp()">˄</button>
            <button onclick="volumeDown()">˅</button>
            <button onclick="changeSong()">Change Song</button>
        </div>

        <script>
            //INIT VARIABLES
            var chosenAudio = "Mambo.mp3";
            var sourceElement = document.getElementById('audio');
            var audioElement = document.getElementById("music");
            var audio = document.getElementById("music");

            //INIT AUDIO PLAYER
            audio.volume = 0.25;
            sourceElement.src = `audio/${chosenAudio}`;
            audioElement.load();

            //CHANGE VOLUME
            function volumeUp() {
                audio.volume += 0.05;
            }
            function volumeDown() {
                audio.volume -= 0.05;
            }

            //CHANGE AUDIO
            function changeSong() {
                chosenAudio = "Koi No Disco Queen.mp3";
                sourceElement.src = `audio/${chosenAudio}`;
                audioElement.load();
            }
        </script>
    </body>
</html>
