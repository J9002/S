<!DOCTYPE html>
<html>
    <head>
        <!--TAB INIT AND METAS-->
        <title>John Website</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--CSS STYLING-->
        <style>
            body {
                font-family: monospace;
                background-color: #3d3d5c;
                color: #e0e0e0;
            }
            button {
                background-color: rgb(30, 60, 70);
                color: #e0e0e0;
                border-radius: 2px;
                cursor: pointer;
            }
            select {
                background-color:rgb(30, 60, 70);
                color: #e0e0e0;
                border-radius: 2px;
                cursor: pointer;
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999;
                color: black;
                background-color: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
            .hidden {
                display: none;
                visibility: hidden;
                pointer-events: none;
            }
            .center {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .center video {
                width: 32vw;
                display: block;
            }
            .footer {
                position: fixed;
                left: 0;
                bottom: 0;
                width: 100%;
            }
        </style>
    </head>

    <body>
        <!--OVERLAY-->
        <div id="overlay" class="overlay">
            <img src="images/favicon.png" alt="">
        </div>

        <script>
            window.overlay = document.getElementById("overlay");
            function hideOverlay() {
                window.overlay.classList.add("hidden");
                audioElement.play();
            }
            window.overlay.addEventListener("click", hideOverlay);
        </script>

        <!--HEADERS-->
        <h1>John Website</h1>
        <h2>Yes it is him, John Website</h2>

        <!--MAIN CONTENT-->
        <div class="center">
            <video autoplay muted loop playsinline style="pointer-events: auto;" id="maxwell">
                <source src="images/maxwell.mp4" type="video/mp4">
            </video>
        </div>

        <!--AUDIO INIT AND CONTROLS-->
        <audio loop id="music">
            <source id="audio" src="" type="audio/mpeg">
        </audio>

        <div class="footer">
            <text>Volume: </text>
            <button onclick="volumeUp()">˄</button>
            <button onclick="volumeDown()">˅</button>
            <label for="dropdown">Song Presets: </label>
            <select name="dropdown" id="dropdown"></select>
        </div>

        <script type="module">
            //BPM MODULE
            import BeatDetect from './external/BeatDetect.js';
            window.beatDetect = new BeatDetect({
                sampleRate: 44100,
                log: false,
                perf: false,
                round: false,
                float: 4,
                lowPassFreq: 150,
                highPassFreq: 100,
                bpmRange: [90, 180],
                timeSignature: 4
            });
            window.BPM = null;
        </script>

        <script>
            //INIT VARIABLES
            var chosenAudio = "Mambo";
            var sourceElement = document.getElementById('audio');
            var audioElement = document.getElementById("music");
            var maxwell = document.getElementById("maxwell");
            var video = document.querySelector("video");

            function updateVideoSpeed() {
                if (window.BPM) {
                    video.playbackRate = (window.BPM / 100);
                }
            }

            async function blowUp() {
                audioElement.pause();
                sourceElement.src = "soundEffects/explosion.mp3";
                audioElement.volume = 1;
                audioElement.load();
                await new Promise(resolve => setTimeout(resolve, 20));
                audioElement.play();
                video.playbackRate = 1;
                maxwell.src = "images/explosion.mp4";
                await new Promise(resolve => setTimeout(resolve, 680));
                window.location.reload();
            }
            maxwell.addEventListener("click", blowUp);
        </script>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
            audioElement.volume = 0.25;
            
            //CHANGE VOLUME
            window.volumeUp = function() {
                audioElement.volume += 0.05;
            }
            window.volumeDown = function() {
                audioElement.volume -= 0.05;
            }

            //CHANGE AUDIO
            var dropdown = document.getElementById("dropdown");
            
            async function loadSong(songName) {
                chosenAudio = songName;
                sourceElement.src = `audio/${chosenAudio}.mp3`;
                audioElement.load();
                
                try {
                    const info = await window.beatDetect.getBeatInfo({url: `audio/${chosenAudio}.mp3`});
                    window.BPM = info.bpm;
                    updateVideoSpeed();
                } catch (error) {
                    window.BPM = 120;
                    updateVideoSpeed();
                }
                
                if (window.overlay.classList.contains('hidden')) {
                    setTimeout(() => {
                        audioElement.play();
                    }, 100);
                }
            }
            
            function changeSong() {
                loadSong(dropdown.value);
            }
            dropdown.addEventListener("change", changeSong);

            //PARSE AUDIO NAMES AND ADD TO MENU
            fetch("audio.txt")
                .then(response => response.text())
                .then(data => {
                    var audioFiles = data.split("\n");
                    audioFiles.forEach(function(songName) {
                        songName = songName.trim();
                        if (songName) {
                            let option = new Option(songName, songName);
                            dropdown.appendChild(option);
                        }
                    });
                    loadSong(chosenAudio);
                });
            });
        </script>
    </body>
</html>
