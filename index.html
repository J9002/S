<!DOCTYPE html>
<html>
    <head>
        <!--TAB INIT AND METAS-->
        <title>John Website</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--CSS STYLING-->
        <style>
            body {
                font-family: monospace;
                background-color: #3d3d5c;
                color: #e0e0e0;
            }
            button {
                background-color: rgb(30, 60, 70);
                color: #e0e0e0;
                border-radius: 2px;
                cursor: pointer;
            }
            select {
                background-color:rgb(30, 60, 70);
                color: #e0e0e0;
                border-radius: 2px;
                cursor: pointer;
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999;
                color: black;
                background-color: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
            .hidden {
                display: none;
                visibility: hidden;
                pointer-events: none;
            }
            .center {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .center canvas {
                width: 32vw;
                height: auto;
            }
            .footer {
                position: fixed;
                left: 0;
                bottom: 0;
                width: 100%;
            }
        </style>
    </head>

    <body>
        <!--OVERLAY-->
        <div id="overlay" class="overlay">
            <img src="images/favicon.png" alt="">
        </div>

        <script>
            var overlay = document.getElementById("overlay");
            function hideOverlay() {
                overlay.classList.add("hidden");
                audioElement.play();
            }
            overlay.addEventListener("click", hideOverlay);
        </script>

        <!--HEADERS-->
        <h1>John Website</h1>
        <h2>Yes it is him, John Website</h2>

        <!--MAIN CONTENT-->
        <div class="center">
            <canvas id="maxwell" width="400" height="400" style="width: 32vw; height: auto;"></canvas>
        </div>

        <script>
            var maxwell = document.getElementById("maxwell");
            async function blowUp() {
                audioElement.pause();
                sourceElement.src = "soundEffects/explosion.mp3";
                audioElement.volume = 1;
                audioElement.load();
                await new Promise(resolve => setTimeout(resolve, 20));
                audioElement.play();
    
                if (animationInterval) clearTimeout(animationInterval);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
                    const explosionGif = await fetch('images/explosion.gif');
                    const explosionBuffer = await explosionGif.arrayBuffer();
                    const explosionGifData = parseGIF(explosionBuffer);
                    const explosionFrames = decompressFrames(explosionGifData, true);
    
                    let explosionFrame = 0;
                    function playExplosion() {
                        if (explosionFrame >= explosionFrames.length) {
                            window.location.reload();
                            return;
                        }
                        const frame = explosionFrames[explosionFrame];
                        const imageData = new ImageData(frame.patch, frame.dims.width, frame.dims.height);
                        ctx.putImageData(imageData, frame.dims.left, frame.dims.top);
                        explosionFrame++;
                        setTimeout(playExplosion, frame.delay);
                    }
                    playExplosion();
            }
            maxwell.addEventListener("click", blowUp);
        </script>

        <!--AUDIO INIT AND CONTROLS-->
        <audio loop id="music">
            <source id="audio" src="" type="audio/mpeg">
        </audio>

        <div class="footer">
            <text>Volume: </text>
            <button onclick="volumeUp()">˄</button>
            <button onclick="volumeDown()">˅</button>
            <label for="dropdown">Song: </label>
            <select name="dropdown" id="dropdown"></select>
        </div>

        <script>
            //INIT VARIABLES
            var chosenAudio = "Mambo";
            var sourceElement = document.getElementById('audio');
            var audioElement = document.getElementById("music");
            var currentBPM = null

            //INIT AUDIO PLAYER
            audioElement.volume = 0.25;
            sourceElement.src = `audio/${chosenAudio}.mp3`;
            audioElement.load();

            //CHANGE VOLUME
            function volumeUp() {
                audioElement.volume += 0.05;
            }
            function volumeDown() {
                audioElement.volume -= 0.05;
            }

            //CHANGE AUDIO
            var dropdown = document.getElementById("dropdown");
            async function changeSong() {
                chosenAudio = dropdown.value;
                sourceElement.src = `audio/${chosenAudio}.mp3`;
                await window.detectBPM(chosenAudio);
                audioElement.load();
                if (overlay.classList.contains('hidden')) {
                    setTimeout(() => {
                    audioElement.play();
                    }, 100);
                }
            }
            dropdown.addEventListener("change", changeSong)

            //PARSE AUDIO NAMES AND ADD TO MENU
            fetch("audio.txt")
                .then(response => response.text())
                .then(data => {
                    var audioFiles = data.split("\n");
                    audioFiles.forEach(function(songName) {
                    songName = songName.trim();
                    if (songName) dropdown.appendChild(new Option(songName, songName));
                    });
                });
        </script>

        <!--BPM DETECTION STUFF-->
        <script type="importmap">{"imports": {"web-audio-beat-detector": "./npm/node_modules/web-audio-beat-detector/dist/index.js", "gifuct-js": "./npm/node_modules/gifuct-js/dist/gifuct-js.js"}}</script>
        <script type="module">
            import { parseGIF, decompressFrames } from 'gifuct-js';
            import { analyze } from 'web-audio-beat-detector';

            let currentBPM = 120;
            let gifFrames = [];
            let currentFrame = 0;
            let animationInterval = null;
            let canvas = document.getElementById('maxwell');
            let ctx = canvas.getContext('2d');
            let originalFrameDelays = [];

            async function loadGIF(url) {
                const response = await fetch(url);
                const buffer = await response.arrayBuffer();
                const gif = parseGIF(buffer);
                const frames = decompressFrames(gif, true);
    
                gifFrames = frames;
                originalFrameDelays = frames.map(f => f.delay);
    
                canvas.width = frames[0].dims.width;
                canvas.height = frames[0].dims.height;
    
                drawFrame(0);
                startAnimation();
            }

            function drawFrame(index) {
                const frame = gifFrames[index];
                const imageData = new ImageData(frame.patch, frame.dims.width, frame.dims.height);
                ctx.putImageData(imageData, frame.dims.left, frame.dims.top);
            }

            function getCurrentSpeedMultiplier() {
                return currentBPM / 120;
            }

            function startAnimation() {
                if (animationInterval) clearInterval(animationInterval);
    
                let frameIndex = 0;
    
                function playFrame() {
                    drawFrame(frameIndex);
        
                    const delay = originalFrameDelays[frameIndex];
                    const speedMultiplier = getCurrentSpeedMultiplier();
                    const adjustedDelay = delay / speedMultiplier;
        
                    frameIndex = (frameIndex + 1) % gifFrames.length;
        
                    animationInterval = setTimeout(playFrame, adjustedDelay);
                }
    
                playFrame();
            }

            function restartAnimation() {
                if (gifFrames.length > 0) {
                    if (animationInterval) clearTimeout(animationInterval);
                        startAnimation();
                }
            }

            async function detectBPM(songName) {
                try {
                    const audioContext = new AudioContext();
                    await audioContext.resume();
        
                    const response = await fetch(`audio/${songName}.mp3`);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        
                    const bpm = await analyze(audioBuffer);
                    currentBPM = Math.round(bpm);
        
                    await audioContext.close();
        
                    restartAnimation();
        
                    return currentBPM;
                } catch (error) {
                    console.error('BPM detection failed:', error);
                    return null;
                  }
            }

            window.detectBPM = detectBPM;

            loadGIF('images/maxwell.gif');
        </script>
    </body>
</html>
