<!DOCTYPE html>
<html>
    <head>
        <!--TAB INIT AND METAS-->
        <title>John Website</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--CSS STYLING-->
        <style>
            body {
                font-family: monospace;
                background-color: #3d3d5c;
                color: #e0e0e0;
            }
            button {
                background-color: rgb(30, 60, 70);
                border-radius: 2px;
                cursor: pointer;
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999;
                color: black;
                background-color: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
            .hidden {
                display: none;
                visibility: hidden;
                pointer-events: none;
            }
            .center {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .center img {
                width: 32vw;
            }
            .footer {
                position: fixed;
                left: 0;
                bottom: 0;
                width: 100%;
            }
        </style>
    </head>

    <body>
        <!--OVERLAY-->
        <div id="overlay" class="overlay">
            <img src="images/favicon.png" alt="">
        </div>

        <script>
            var overlay = document.getElementById("overlay");
            function hideOverlay() {
                overlay.classList.add("hidden");
                audioElement.play();
            }
            overlay.addEventListener("click", hideOverlay);
        </script>

        <!--HEADERS-->
        <h1>John Website</h1>
        <h2>Yes it is him, John Website</h2>

        <!--MAIN CONTENT-->
        <div class="center">
            <img src="images/maxwell.gif" alt="Maxwell">
        </div>

        <!--AUDIO INIT AND CONTROLS-->
        <audio loop id="music">
            <source id="audio" src="" type="audio/mpeg">
        </audio>

        <div class="footer">
            <text>Volume: </text>
            <button onclick="volumeUp()">˄</button>
            <button onclick="volumeDown()">˅</button>
            <label for="dropdown">Song: </label>
            <select name="dropdown" id="dropdown">
                <option value="Mambo">Mambo</option>
                <option value="Koi No Disco Queen">Koi No Disco Queen</option>
            </select>
        </div>

        <script>
            //INIT VARIABLES
            var chosenAudio = "Mambo";
            var sourceElement = document.getElementById('audio');
            var audioElement = document.getElementById("music");

            //INIT AUDIO PLAYER
            audioElement.volume = 0.25;
            sourceElement.src = `audio/${chosenAudio}.mp3`;
            audioElement.load();

            //CHANGE VOLUME
            function volumeUp() {
                audioElement.volume += 0.05;
            }
            function volumeDown() {
                audioElement.volume -= 0.05;
            }

            //CHANGE AUDIO
            var dropdown = document.getElementById("dropdown");
            function changeSong() {
                chosenAudio = dropdown.value;
                sourceElement.src = `audio/${chosenAudio}.mp3`;
                audioElement.load();
                if (overlay.classList.contains('hidden')) {
                    setTimeout(() => {
                    audioElement.play();
                    }, 100);
                }
            }
            dropdown.addEventListener("change", changeSong)
        </script>
    </body>
</html>
